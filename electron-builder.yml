appId: com.ruby-sei.thunder-desktop
productName: Thunder Desktop
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  # TD-037: ffmpeg-static ships a platform binary that must live on
  # the real filesystem (not inside app.asar) so child_process.spawn
  # can exec it. The wrapper rewrites the reported path from
  # `app.asar/...` to `app.asar.unpacked/...` at runtime.
  - node_modules/ffmpeg-static/**
win:
  executableName: thunder-desktop
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  executableName: thunder-desktop
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Must be flipped to `true` (with APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID env vars set) before any production macOS release —
  # see TD-027. Until then the .dmg ships un-notarized and Gatekeeper
  # blocks it on first launch (right-click → Open bypasses for dev use).
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: swaff-y
  repo: thunder-desktop
